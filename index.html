<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study With Me: สมุดพกความฝัน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcf8f2;
            --text-color: #4a4a4a;
            --card-bg: #ffffff;
            --accent-color: #ffb7b2;
            --accent-secondary: #b5ead7;
            --header-bg: #ffdac1;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #2d2d2d;
            --text-color: #f5f5f5;
            --card-bg: #3d3d3d;
            --accent-color: #ff9aa2;
            --accent-secondary: #85c7b3;
            --header-bg: #4a3f35;
            --shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background-color: var(--header-bg);
            padding: 1.5rem;
            text-align: center;
            position: relative;
            box-shadow: var(--shadow);
        }

        .header-content h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header-content p {
            font-size: 1rem;
            opacity: 0.8;
        }

        nav {
            margin-top: 1rem;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin: 0 1rem;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-color);
            font-family: 'Kanit', sans-serif;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .hero {
            grid-column: 1 / -1;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--accent-color);
        }

        .blog-posts {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .card-img {
            height: 150px;
            background: var(--accent-secondary);
            opacity: 0.7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #4a4a4a;
        }

        .card-body {
            padding: 1.5rem;
        }

        .tag {
            display: inline-block;
            background: var(--header-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .card-title {
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
        }

        .card-text {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: #4a4a4a;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.8;
        }

        sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .widget {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .profile-widget {
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-color);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            margin: 1rem 0;
            font-family: monospace;
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .timer-controls .btn {
            font-size: 0.9rem;
            padding: 0.4rem 0.8rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            background: var(--header-bg);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <button class="theme-toggle" id="themeToggle">โหมดมืด 🌙</button>
        <div class="header-content">
            <h1>Study With Me: สมุดพกความฝัน</h1>
            <p>บันทึกการเรียน ไลฟ์สไตล์ และเส้นทางสู่คณะในฝัน ✨</p>
        </div>
        <nav>
            <a href="#">หน้าแรก</a>
            <a href="#">เกี่ยวกับ
